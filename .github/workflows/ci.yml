name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payments_test
          POSTGRES_USER: payments_user
          POSTGRES_PASSWORD: test_secret
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json
      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci
      - name: Lint
        working-directory: apps/backend
        run: npm run lint
      - name: Type check
        working-directory: apps/backend
        run: npm run build
      - name: Unit tests
        working-directory: apps/backend
        run: npm run test
        env:
          DATABASE_URL: postgresql://payments_user:test_secret@localhost:5432/payments_test
          NODE_ENV: test
      - name: Integration tests
        working-directory: apps/backend
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://payments_user:test_secret@localhost:5432/payments_test
          NODE_ENV: test

  frontend-lint-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci
      - name: Lint
        working-directory: apps/frontend
        run: npm run lint
      - name: Type check
        working-directory: apps/frontend
        run: npm run type-check
      - name: Unit tests
        working-directory: apps/frontend
        run: npm run test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t payments-backend:test apps/backend
      - name: Build frontend image
        run: docker build -t payments-frontend:test apps/frontend

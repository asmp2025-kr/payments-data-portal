version: "3.9"

networks:
  payments-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  opensearch_data:
  n8n_data:
  prometheus_data:
  grafana_data:
  loki_data:
  keycloak_data:

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: payments-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: payments_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payments_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    networks:
      - payments-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: payments-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/payments_db
      KC_DB_USERNAME: payments_user
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-payments_secret}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    networks:
      - payments-net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: payments-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - payments-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO Init (create buckets) ───────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: payments-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - payments-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio_admin} ${MINIO_ROOT_PASSWORD:-minio_secret};
      mc mb --ignore-existing local/reports;
      mc mb --ignore-existing local/logos;
      mc mb --ignore-existing local/exports;
      mc policy set download local/reports;
      exit 0;
      "

  # ─── OpenSearch ────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: payments-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - payments-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── n8n Workflow ──────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: payments-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: payments_db
      DB_POSTGRESDB_USER: payments_user
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-payments_secret}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-n8n_admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-n8n_secret}
      WEBHOOK_URL: http://localhost:5678
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-n8n_encrypt_key_32chars_minimum!!}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    ports:
      - "5678:5678"
    networks:
      - payments-net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: payments-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - payments-net

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: payments-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secret}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    networks:
      - payments-net
    depends_on:
      - prometheus
      - loki

  # ─── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: payments-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - payments-net

  # ─── Backend (NestJS) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: payments-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://payments_user:${POSTGRES_PASSWORD:-payments_secret}@postgres:5432/payments_db
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: payments
      KEYCLOAK_CLIENT_ID: payments-portal
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret}
      OPENSEARCH_URL: http://opensearch:9200
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      LOKI_URL: http://loki:3100
      FRONTEND_URL: http://frontend:4000
    ports:
      - "3000:3000"
    networks:
      - payments-net
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: payments-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost/auth
      NEXT_PUBLIC_KEYCLOAK_REALM: payments
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: payments-portal
    ports:
      - "4000:4000"
    networks:
      - payments-net
    depends_on:
      - backend

  # ─── NGINX ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: payments-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - payments-net
    depends_on:
      - backend
      - frontend

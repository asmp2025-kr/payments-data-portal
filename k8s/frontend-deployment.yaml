apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-frontend
  namespace: payments-portal
  labels:
    app: payments-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-frontend
  template:
    metadata:
      labels:
        app: payments-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/payments-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: payments-frontend-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payments-frontend
  namespace: payments-portal
spec:
  selector:
    app: payments-frontend
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payments-ingress
  namespace: payments-portal
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: payments.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: payments-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payments-frontend
                port:
                  number: 4000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-backend
  namespace: payments-portal
  labels:
    app: payments-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-backend
  template:
    metadata:
      labels:
        app: payments-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/payments-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: payments-backend-secrets
            - configMapRef:
                name: payments-backend-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payments-backend
  namespace: payments-portal
spec:
  selector:
    app: payments-backend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payments-backend-hpa
  namespace: payments-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
